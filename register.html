<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — FreshMart</title>
  <link rel="stylesheet" href="static/css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>">
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <a class="navbar-logo" href="index.html">🌿 FreshMart</a>
    <div class="navbar-actions">
      <a class="cart-btn" href="cart.html">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        Cart <span class="cart-count">0</span>
      </a>
    </div>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-card" style="max-width:440px;">

    <div class="auth-logo">🌿 FreshMart</div>
    <div class="auth-sub">Create your free account and start shopping</div>

    <!-- Benefit chips -->
    <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:24px;">
      <span class="badge badge-success">⚡ 30-min delivery</span>
      <span class="badge badge-success">🎁 20% first order</span>
      <span class="badge badge-success">🔒 Secure checkout</span>
    </div>

    <form id="register-form">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">First name</label>
          <input class="form-input" type="text" name="first_name" placeholder="Riya" required>
        </div>
        <div class="form-group">
          <label class="form-label">Last name</label>
          <input class="form-input" type="text" name="last_name" placeholder="Sharma" required>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Email address</label>
        <input class="form-input" type="email" name="email" placeholder="you@example.com" autocomplete="email" required>
      </div>

      <div class="form-group">
        <label class="form-label">Phone number</label>
        <input class="form-input" type="tel" name="phone" placeholder="+91 98765 43210">
        <div class="form-hint">For delivery updates and OTP verification</div>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" name="password" placeholder="Min. 8 characters" autocomplete="new-password" minlength="8" required>
      </div>

      <div class="form-group">
        <label class="form-label">Confirm password</label>
        <input class="form-input" type="password" name="confirm_password" placeholder="Repeat your password" autocomplete="new-password" required>
      </div>

      <div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:16px;">
        <input type="checkbox" id="terms-agree" style="accent-color:var(--green);width:14px;height:14px;margin-top:2px;" required>
        <label for="terms-agree" style="font-size:12px;color:var(--text-2);cursor:pointer;line-height:1.5;">
          I agree to FreshMart's <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
        </label>
      </div>

      <button class="form-submit" type="submit">Create my account</button>
    </form>

    <div class="auth-divider">or sign up with</div>

    <button class="social-btn">
      <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>

    <div class="auth-footer">
      Already have an account? <a href="login.html">Sign in</a>
    </div>

  </div>
</div>

<script src="static/js/script.js"></script>
</body>
</html>
