<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products — FreshMart</title>
  <link rel="stylesheet" href="static/css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>">
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <a class="navbar-logo" href="index.html">🌿 FreshMart</a>
    <div class="navbar-search">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" placeholder="Search for groceries…">
    </div>
    <div class="navbar-actions">
      <a class="nav-link" href="login.html">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Sign in
      </a>
      <a class="cart-btn" href="cart.html">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        Cart <span class="cart-count">0</span>
      </a>
    </div>
  </div>
</nav>

<main class="container" style="padding-top:28px;padding-bottom:48px;">

  <div class="breadcrumb">
    <a href="index.html">Home</a>
    <span class="breadcrumb-sep">›</span>
    <span>Products</span>
  </div>

  <div class="page-header">
    <h1>All Products</h1>
    <p>Fresh, quality groceries delivered in 30 minutes</p>
  </div>

  <!-- Filters -->
  <div class="filter-bar">
    <button class="filter-chip active" data-category="all">All products</button>
    <button class="filter-chip" data-category="vegetables">🥦 Vegetables</button>
    <button class="filter-chip" data-category="fruits">🍎 Fruits</button>
    <button class="filter-chip" data-category="dairy">🥛 Dairy</button>
    <button class="filter-chip" data-category="bakery">🥐 Bakery</button>
    <button class="filter-chip" data-category="drinks">🧃 Drinks</button>
    <button class="filter-chip" data-category="snacks">🍟 Snacks</button>
    <button class="filter-chip sort" id="sort-btn">Sort: Default ↕</button>
  </div>

  <!-- Grid -->
  <div class="product-grid" data-auto-render="true" id="product-grid"></div>

  <!-- Pagination -->
  <div class="pagination">
    <button class="page-btn active">1</button>
    <button class="page-btn">2</button>
    <button class="page-btn">3</button>
    <button class="page-btn">›</button>
  </div>

</main>

<footer>
  <div class="container">
    <div class="footer-bottom" style="border-top:none;padding-top:0;">
      <p>© 2025 FreshMart</p>
      <p><a href="index.html">Home</a> · <a href="cart.html">Cart</a> · <a href="login.html">Account</a></p>
    </div>
  </div>
</footer>

<script src="static/js/script.js"></script>
<script>
  // Sort toggle
  let sortAsc = true;
  document.getElementById('sort-btn').addEventListener('click', function() {
    sortAsc = !sortAsc;
    this.textContent = `Sort: Price ${sortAsc ? '↑' : '↓'}`;
    const grid = document.getElementById('product-grid');
    const cards = Array.from(grid.querySelectorAll('.product-card'));
    cards.sort((a, b) => {
      const pa = parseInt(a.querySelector('.product-price').textContent.replace('₹',''));
      const pb = parseInt(b.querySelector('.product-price').textContent.replace('₹',''));
      return sortAsc ? pa - pb : pb - pa;
    });
    cards.forEach(c => grid.appendChild(c));
  });
</script>
</body>
</html>
