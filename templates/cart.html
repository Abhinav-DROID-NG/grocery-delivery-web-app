<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - Grocery Delivery</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <h1>🛒 Grocery Delivery</h1>
            </div>
            <ul class="nav-menu">
                <li><a href="/">Home</a></li>
                <li><a href="/products">Products</a></li>
                <li><a href="/cart" class="cart-link">Cart <span class="cart-count">0</span></a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="cart-container">
            <div class="cart-content">
                <h2>Shopping Cart</h2>
                <div id="emptyCart" class="empty-cart">
                    <p>Your cart is empty</p>
                    <a href="/products" class="btn btn-primary">Continue Shopping</a>
                </div>
                <table class="cart-table" id="cartTable" style="display: none;">
                    <thead>
                        <tr>
                            <th>Product</th>
                            <th>Price</th>
                            <th>Quantity</th>
                            <th>Total</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="cartBody">
                    </tbody>
                </table>
            </div>

            <aside class="cart-summary" id="cartSummary" style="display: none;">
                <h3>Order Summary</h3>
                <div class="summary-item">
                    <span>Subtotal:</span>
                    <span id="subtotal">₹0</span>
                </div>
                <div class="summary-item">
                    <span>Delivery:</span>
                    <span id="delivery">₹50</span>
                </div>
                <div class="summary-item total">
                    <span>Total:</span>
                    <span id="totalAmount">₹0</span>
                </div>

                <div class="checkout-form">
                    <h4>Delivery Details</h4>
                    <input type="text" id="customerName" placeholder="Full Name" required>
                    <input type="email" id="customerEmail" placeholder="Email" required>
                    <input type="tel" id="customerPhone" placeholder="Phone Number" required>
                    <textarea id="deliveryAddress" placeholder="Delivery Address" rows="3" required></textarea>
                    <button class="btn btn-primary btn-full" id="checkoutBtn">Place Order</button>
                </div>
            </aside>
        </div>
    </div>

    <footer class="footer">
        <p>&copy; 2024 Grocery Delivery. All rights reserved.</p>
    </footer>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
    <script src="{{ url_for('static', filename='js/cart.js') }}"></script>
</body>
</html>
