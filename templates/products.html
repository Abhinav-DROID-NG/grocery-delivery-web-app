<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - Grocery Delivery</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <h1>🛒 Grocery Delivery</h1>
            </div>
            <ul class="nav-menu">
                <li><a href="/">Home</a></li>
                <li><a href="/products">Products</a></li>
                <li><a href="/cart" class="cart-link">Cart <span class="cart-count">0</span></a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="products-page">
            <aside class="sidebar">
                <h3>Categories</h3>
                <div class="category-list">
                    <button class="category-btn active" data-category="all">All Products</button>
                </div>
            </aside>

            <main class="products-main">
                <div class="products-header">
                    <h2>Our Products</h2>
                    <input type="text" id="searchInput" class="search-box" placeholder="Search products...">
                </div>
                <div class="loading" id="loadingSpinner">Loading products...</div>
                <div class="products-grid" id="productsGrid">
                    <!-- Products loaded via JavaScript -->
                </div>
            </main>
        </div>
    </div>

    <footer class="footer">
        <p>&copy; 2024 Grocery Delivery. All rights reserved.</p>
    </footer>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
    <script src="{{ url_for('static', filename='js/products.js') }}"></script>
</body>
</html>
