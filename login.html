<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — FreshMart</title>
  <link rel="stylesheet" href="static/css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>">
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <a class="navbar-logo" href="index.html">🌿 FreshMart</a>
    <div class="navbar-actions">
      <a class="cart-btn" href="cart.html">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        Cart <span class="cart-count">0</span>
      </a>
    </div>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-card">

    <div class="auth-logo">🌿 FreshMart</div>
    <div class="auth-sub">Welcome back! Sign in to your account</div>

    <!-- Social -->
    <button class="social-btn">
      <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>

    <div class="auth-divider">or sign in with email</div>

    <form id="login-form">
      <div class="form-group">
        <label class="form-label">Email address</label>
        <input class="form-input" type="email" name="email" placeholder="you@example.com" autocomplete="email" required>
      </div>
      <div class="form-group">
        <label class="form-label" style="display:flex;justify-content:space-between;">
          Password
          <a href="#" style="font-size:11px;color:var(--green);font-weight:500;text-transform:none;letter-spacing:0;">Forgot password?</a>
        </label>
        <input class="form-input" type="password" name="password" placeholder="Enter your password" autocomplete="current-password" required>
      </div>

      <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px;">
        <input type="checkbox" id="remember" style="accent-color:var(--green);width:14px;height:14px;">
        <label for="remember" style="font-size:12px;color:var(--text-2);cursor:pointer;">Remember me for 30 days</label>
      </div>

      <button class="form-submit" type="submit">Sign in</button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a href="register.html">Create one free</a>
    </div>

    <div class="terms-text">
      By continuing, you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
    </div>

  </div>
</div>

<script src="static/js/script.js"></script>
</body>
</html>
